<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Exam Result</title>
    <link rel="stylesheet" href="result.css">
</head>
<body>

<div class="container">
    <h2>Exam Result</h2>

    <h3 id="user"></h3>

    <div class="score-box">
        <p>Total Questions: <span id="total"></span></p>
        <p>Correct Answers: <span id="correct"></span></p>
        <p>Wrong Answers: <span id="wrong"></span></p>
        <h3>Your Score: <span id="score"></span></h3>
    </div>

    <button onclick="goDashboard()">Back to Dashboard</button>
</div>

<script src="result.js"></script>
</body>
</html>
